version: '3.8'

x-spark-common: &spark-common
  build:
    context: .
    dockerfile: docker/spark/Dockerfile
  env_file: .env
  volumes:
    - ./etl_pipeline:/opt/spark/etl_pipeline
    - ./dataset:/opt/spark/dataset
    - ./config:/opt/spark/config
  networks:
    - lakehouse-net

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    SPARK_MASTER_URL: spark://spark-master:7077
  volumes:
    - ./dags:/opt/airflow/dags
    - ./etl_pipeline:/opt/airflow/etl_pipeline
    - ./config:/opt/airflow/config
    - ./dataset:/opt/airflow/dataset
    - airflow-logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
  networks:
    - lakehouse-net

services:

  # ── SPARK ─────────────────────────────────────────────
  spark-master:
    <<: *spark-common
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080
    environment:
      SPARK_MASTER_HOST: spark-master
    ports:
      - "8080:8080"    # Spark Master UI
      - "7077:7077"    # Spark submit port

  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 2 --memory 2G
    depends_on:
      - spark-master

  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 2 --memory 2G
    depends_on:
      - spark-master

  # ── AIRFLOW ───────────────────────────────────────────
  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - lakehouse-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: |
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Nhom --lastname 6 --role Admin --email nhom6@lakehouse.com
      "
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"    # Airflow UI (8081 tránh trùng Spark)
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── JUPYTER ───────────────────────────────────────────
  jupyter:
    <<: *spark-common
    container_name: jupyter
    command: bash -c "pip install jupyter && jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=nhom6 --notebook-dir=/opt/spark/notebooks"
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - ./dataset:/opt/spark/dataset
      - ./config:/opt/spark/config
      - ./etl_pipeline:/opt/spark/etl_pipeline
      - ./src:/opt/spark/src
    ports:
      - "8888:8888"

volumes:
  airflow-db-data:
  airflow-logs:

networks:
  lakehouse-net:
    driver: bridge